<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gracias | Ecosistema Oasis</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(55% 45% at 50% 0%, rgba(34, 211, 238, 0.2) 0%, #0a0a0a 70%);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #e5e7eb;
      }
      .card {
        width: min(560px, 92vw);
        border: 1px solid #262626;
        border-radius: 20px;
        background: rgba(10, 10, 10, 0.85);
        padding: 2rem;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 5vw, 2.5rem);
        letter-spacing: -0.03em;
      }
      p {
        margin-top: 0.9rem;
        color: #cbd5e1;
      }
      a {
        margin-top: 1.4rem;
        display: inline-block;
        padding: 0.75rem 1.2rem;
        border-radius: 12px;
        border: 1px solid rgba(34, 211, 238, 0.35);
        color: #bae6fd;
        text-decoration: none;
      }
      a:hover {
        background: rgba(34, 211, 238, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Gracias por escribirnos</h1>
      <p>Recibimos tu solicitud. Nuestro equipo pastoral te contactara pronto.</p>
      <a href="/">Volver al inicio</a>
    </main>
  </body>
</html>
